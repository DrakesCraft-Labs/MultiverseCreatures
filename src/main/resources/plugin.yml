name: MultiverseCreatures
version: '${project.version}'
main: com.Chagui68.MutlverseCreatures
api-version: '1.20'
author: Chagui68
description: A themed creatures and items plugin 
website: https://github.com/Chagui68/MultiverseCreatures
softdepend:
  - LibsDisguises

commands:
  msc:
    description: Main command for MultiverseCreatures
    usage: /msc spawn <type>
    permission: multiversecreatures.admin

permissions:
  multiversecreatures.admin:
    description: Allows users to spawn custom entities
    default: op
